<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MetloRad (BETA)</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=20260417" />
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="/favicon.ico?v=20260417"
    />
    <link rel="apple-touch-icon" href="/favicon.ico?v=20260417" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ol@10.6.1/ol.css"
    />
    <link rel="stylesheet" href="/static/styles.css?v=20260417_17" />
  </head>
  <body>
    <div id="map"></div>
    <button
      class="mobile-menu-toggle"
      id="mobileMenuToggleBtn"
      type="button"
      title="Открыть меню"
      aria-label="Открыть меню"
    >
      <span class="btn-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M4 7h16v2H4zM4 11h16v2H4zM4 15h16v2H4z"></path>
        </svg>
      </span>
    </button>
    <div class="mobile-menu-backdrop hidden" id="mobileMenuBackdrop"></div>
    <aside
      class="mobile-menu-drawer hidden"
      id="mobileMenuDrawer"
      aria-hidden="true"
    >
      <div class="mobile-menu-header">
        <span class="mobile-menu-title">Меню</span>
        <button
          class="mobile-menu-close"
          id="mobileMenuCloseBtn"
          type="button"
          title="Закрыть меню"
          aria-label="Закрыть меню"
        >
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path
                d="M6.7 5.3 12 10.6l5.3-5.3 1.4 1.4L13.4 12l5.3 5.3-1.4 1.4L12 13.4l-5.3 5.3-1.4-1.4L10.6 12 5.3 6.7z"
              ></path>
            </svg>
          </span>
        </button>
      </div>
      <div class="mobile-menu-section">
        <div class="mobile-section-title">Слой</div>
        <select
          class="mobile-source-select"
          id="mobileSourceLayerSelect"
          title="Активный слой осадков"
        >
          <option value="__hd__">Опасные явления HD</option>
        </select>
      </div>
      <div class="mobile-menu-section hidden" id="mobileSatelliteStylePanel">
        <div class="mobile-section-title">Спутниковый режим</div>
        <label class="mobile-satellite-row" for="mobileSatelliteColorMode">
          <span>Отображение:</span>
          <select id="mobileSatelliteColorMode" class="mobile-source-select">
            <option value="hd_day" selected>
              True Colour RGB - MTG - 0 degree
            </option>
            <option value="gray_dn">
              FCI HRFI IR10.5 μm Image - MTG - 0 degree
            </option>
          </select>
        </label>
        <label
          class="mobile-satellite-row mobile-satellite-check"
          id="mobileSatelliteColorizedRow"
        >
          <input type="checkbox" id="mobileSatelliteColorizedToggle" />
          <span>Цветной</span>
        </label>
        <label class="mobile-satellite-row mobile-satellite-check">
          <input type="checkbox" id="mobileSatelliteRdtToggle" />
          <span>Быстро развивающиеся грозы</span>
        </label>
      </div>
      <div class="mobile-menu-section" id="mobileLegendPanel">
        <div class="mobile-section-title" id="mobileLegendTitleText">
          Легенда
        </div>
        <div class="mobile-legend-wrap">
          <table>
            <tbody id="mobileLegendRows"></tbody>
          </table>
        </div>
      </div>
    </aside>
    <div
      class="map-crosshair hidden"
      id="mapCrosshair"
      aria-hidden="true"
    ></div>
    <div class="crosshair-info hidden" id="crosshairInfo">—</div>
    <div class="lightning-popup hidden" id="lightningPopup">
      <span class="lightning-popup-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path d="M13 2 4 14h6l-1 8 9-12h-6z"></path>
        </svg>
      </span>
      <span id="lightningPopupText">—</span>
    </div>
    <div class="top-left-panels">
      <div class="source-panel">
        <span>Слой:</span>
        <select id="sourceLayerSelect" title="Активный слой осадков">
          <option value="__hd__">Опасные явления HD</option>
        </select>
      </div>
    </div>
    <div class="satellite-style-panel hidden" id="satelliteStylePanel">
      <div class="panel-title">Спутниковый режим</div>
      <label class="toggle-row" for="satelliteColorMode">
        <span>Отображение:</span>
        <select id="satelliteColorMode" title="Режим спутникового слоя">
          <option value="hd_day" selected>Спутник HD (День)</option>
          <option value="gray_dn">Спутник (День/Ночь)</option>
        </select>
      </label>
      <label
        class="toggle-row satellite-colorized-toggle"
        id="satelliteColorizedRow"
      >
        <input type="checkbox" id="satelliteColorizedToggle" />
        <span>Цветной</span>
      </label>
      <label class="toggle-row satellite-colorized-toggle">
        <input type="checkbox" id="satelliteRdtToggle" />
        <span>Rapidly Developing Thunderstorms</span>
      </label>
    </div>

    <div class="legend-panel" id="legendPanel">
      <div
        class="legend-header"
        id="legendToggle"
        title="Свернуть / развернуть"
      >
        <span class="legend-title" id="legendTitleText">Легенда</span>
        <span class="legend-toggle-icon">▼</span>
      </div>
      <div class="legend-body">
        <table>
          <tbody id="legendRows"></tbody>
        </table>
      </div>
    </div>

    <div class="control-panel">
      <!-- <h3>Таймлайн</h3> -->
      <div class="timeline-row">
        <div class="transport-row">
          <div class="step-btns">
            <button class="step-btn" id="firstBtn" title="Самый первый кадр">
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M6 5h2v14H6zM18 6 9 12l9 6z"></path>
                </svg>
              </span>
            </button>
            <button class="step-btn" id="prevBtn" title="Предыдущий кадр">
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M16 6 8 12l8 6z"></path>
                </svg>
              </span>
            </button>
            <button class="play-btn" id="playBtn" title="Play/Pause">
              <span class="btn-icon" id="playBtnIcon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M8 6v12l10-6z"></path>
                </svg>
              </span>
            </button>
            <button class="step-btn" id="nextBtn" title="Следующий кадр">
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="m8 6 8 6-8 6z"></path>
                </svg>
              </span>
            </button>
            <button class="step-btn" id="lastBtn" title="Самый последний кадр">
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M16 5h2v14h-2zM6 6l9 6-9 6z"></path>
                </svg>
              </span>
            </button>
          </div>
          <span class="time-label" id="timeLabel">—</span>
        </div>
        <div class="tools-row">
          <div class="tool-btns">
            <button
              class="tool-btn"
              id="measureBtn"
              title="Измерить расстояние"
            >
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="m5 16 7-7 7 7-2 2-7-7-3 3-2-2zm10.6-9.2 1.8-1.8 1.4 1.4-1.8 1.8zM4 20h16v2H4z"
                  ></path>
                </svg>
              </span>
            </button>
            <button class="tool-btn" id="drawBtn" title="Рисовать на карте">
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path
                    d="m4 16.3 9.6-9.6 3.7 3.7-9.6 9.6L4 21zM14.3 6l2-2a1 1 0 0 1 1.4 0l2.3 2.3a1 1 0 0 1 0 1.4l-2 2zM4 21l3.9-1.1L5.1 17z"
                  ></path>
                </svg>
              </span>
            </button>
            <button
              class="tool-btn"
              id="crosshairBtn"
              title="Перекрестье в центре"
            >
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M11 4h2v6h6v2h-6v6h-2v-6H5v-2h6z"></path>
                </svg>
              </span>
            </button>
            <button
              class="tool-btn active"
              type="button"
              id="lightningToggleBtn"
              title="Показывать точки молний"
            >
              <span class="btn-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M13 2 4 14h6l-1 8 9-12h-6z"></path>
                </svg>
              </span>
            </button>
          </div>
        </div>
      </div>
      <input
        class="timeline-hidden"
        type="range"
        id="timeline"
        min="0"
        max="0"
        value="0"
        step="1"
        aria-hidden="true"
        tabindex="-1"
      />
      <div class="playback-settings">
        <span>Кадров в цикле:</span>
        <select
          id="playbackFrameCount"
          title="Сколько последних кадров крутить"
        >
          <option value="6">6</option>
          <option value="12">12</option>
          <option value="18" selected>18</option>
        </select>
      </div>
      <div class="status" id="status">Загрузка данных…</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@10.6.1/dist/ol.js"></script>
    <script src="/static/app.js?v=20260418_07"></script>
  </body>
</html>
